<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" (click)="cancelled.emit()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg" (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between p-6 border-b border-slate-200">
      <h2 class="text-lg font-semibold text-slate-800">
        {{ isEdit ? 'Edit Task' : 'New Task' }}
      </h2>
      <button
        (click)="cancelled.emit()"
        class="text-slate-400 hover:text-slate-600 transition"
        aria-label="Close"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="p-6 space-y-4">
      @if (error()) {
        <div class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
          {{ error() }}
        </div>
      }

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Title <span class="text-red-500">*</span></label>
        <input
          formControlName="title"
          type="text"
          placeholder="Task title"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
        />
        @if (form.controls.title.touched && form.controls.title.invalid) {
          <p class="mt-1 text-xs text-red-500">Title is required</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea
          formControlName="description"
          rows="3"
          placeholder="Optional details…"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm resize-none"
        ></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Priority</label>
          <select
            formControlName="priority"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white"
          >
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Due Date</label>
          <input
            formControlName="due_date"
            type="date"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          />
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button
          type="button"
          (click)="cancelled.emit()"
          class="flex-1 py-2 px-4 border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 transition text-sm"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="loading()"
          class="flex-1 py-2 px-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-medium rounded-lg transition text-sm"
        >
          @if (loading()) { Saving… } @else { {{ isEdit ? 'Save Changes' : 'Create Task' }} }
        </button>
      </div>
    </form>
  </div>
</div>
