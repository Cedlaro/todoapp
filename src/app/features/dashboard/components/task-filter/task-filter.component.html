<div class="flex flex-wrap gap-3 items-center">
  <div class="relative flex-1 min-w-48">
    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
      </svg>
    </span>
    <input
      [(ngModel)]="search"
      (ngModelChange)="emit()"
      type="text"
      placeholder="Search tasks…"
      class="w-full pl-9 pr-4 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <select
    [(ngModel)]="status"
    (ngModelChange)="emit()"
    class="py-2 px-3 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
  >
    <option value="">All statuses</option>
    <option value="pending">Pending</option>
    <option value="completed">Completed</option>
  </select>

  <select
    [(ngModel)]="priority"
    (ngModelChange)="emit()"
    class="py-2 px-3 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
  >
    <option value="">All priorities</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>

  @if (search || status || priority) {
    <button
      (click)="clear()"
      class="py-2 px-3 text-sm text-slate-500 hover:text-slate-700 border border-slate-300 rounded-lg hover:bg-slate-50 transition"
    >
      Clear
    </button>
  }
</div>
