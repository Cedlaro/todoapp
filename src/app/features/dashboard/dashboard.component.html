<div class="min-h-screen bg-slate-100">

  <!-- Navbar -->
  <header class="bg-slate-900 text-white shadow-lg">
    <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
      <span class="text-xl font-bold tracking-tight">TaskFlow</span>

      <div class="flex items-center gap-4">
        <span class="text-sm text-slate-400 hidden sm:block">{{ auth.currentUser()?.email }}</span>
        <button
          (click)="auth.logout()"
          class="text-sm text-slate-300 hover:text-white border border-slate-600 hover:border-slate-400 rounded-lg px-3 py-1.5 transition"
        >
          Log out
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-4xl mx-auto px-4 py-8">

    <!-- Header row -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">My Tasks</h2>
        <p class="text-sm text-slate-500 mt-0.5">{{ tasks().length }} task{{ tasks().length === 1 ? '' : 's' }}</p>
      </div>
      <button
        (click)="openCreate()"
        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg transition shadow-sm"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        New Task
      </button>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-5">
      <app-task-filter (filtersChange)="onFiltersChange($event)" />
    </div>

    <!-- Task list -->
    <app-task-list
      [tasks]="tasks()"
      [loading]="loading()"
      (toggleStatus)="onToggleStatus($event)"
      (editTask)="openEdit($event)"
      (deleteTask)="onDelete($event)"
    />
  </main>

  <!-- Task form modal -->
  @if (showForm()) {
    <app-task-form
      [task]="editingTask()"
      (saved)="onSaved()"
      (cancelled)="closeForm()"
    />
  }
</div>
